# version: '3.8'
services:
  test_db:
    image: postgres:15
    container_name: test_tripin_db
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: tripin
    ports:
      - "5435:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  test_redis:
    image: redis
    container_name: test_tripin_redis
    ports:
      - "8995:6379"
    tmpfs:
      - /data

  test_server:
    container_name: test_tripin_server
    build: .
    ports:
      - "8985:8000"
      - "1515:1514"
    env_file:
      - .env.test
    depends_on:
      test_db:
        condition: service_healthy
    volumes:
      - ./src/assets/keys:/app/src/assets/keys
    command: >
      sh -c "alembic upgrade head &&
               python tests/scripts/create_test_user.py &&
               python -m pytest tests/ -v"
    restart: "no"
