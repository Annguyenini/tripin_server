name: Tripping Server Test

on:
  workflow_call:
    secrets:
      PRIVATE_KEY:
        required: true
      PUBLIC_KEY:
        required: true
      ENV_TEST_BASE_64:
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://testuser:testpass@test_db:5432/tripin
      FLASK_ENV: testing
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set Up keys
        run: |
          mkdir -p src/assets/keys
          echo "${{ secrets.PRIVATE_KEY }}" > src/assets/keys/private.pem
          echo "${{ secrets.PUBLIC_KEY }}" > src/assets/keys/public.pem

      - name: Set up env
        run: |
          echo "${{ secrets.ENV_TEST_BASE_64 }}" | base64 --decode > .env.test

      - name: Set Up and Run Tests
        run: |
          docker compose -f docker-compose.test.yml down -v
          docker compose -f docker-compose.test.yml up --build --exit-code-from test_server

      - name: Clean Up
        if: always()
        run: |
          docker network create tripin_net_local
          docker compose -f docker-compose.test.yml logs test_server
          docker compose -f docker-compose.test.yml down -v --remove-orphans
