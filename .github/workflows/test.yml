name: Tripping Server Test

on:
  workflow_call:
    secrets:
      PRIVATE_KEY:
        required: true
      PUBLIC_KEY:
        required: true

jobs:
  
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Set Up Container

      - uses: actions/checkout@v3

        run: |
          docker compose -f docker-compose.test.yml --env-file .evn.test up \
          --build \
          --abort-on-container-exit\
          --exit-code-from server_test
    
      - name: clean up
        if: alway()
        run: docker compose -f docker-compose.test.yml down -v
