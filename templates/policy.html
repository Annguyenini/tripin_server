<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>TRIPPING — Privacy Policy</title>
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Permanent+Marker&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg: #fdf6ee;
                --ink: #1a1a1a;
                --peach: #f4a97f;
                --sage: #8fad88;
                --shadow: 3px 3px 0px #1a1a1a;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background: var(--bg);
                font-family: "DM Mono", monospace;
                color: var(--ink);
                min-height: 100vh;
                padding: 48px 24px;
            }

            .grain {
                position: fixed;
                inset: 0;
                pointer-events: none;
                opacity: 0.035;
                background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
                background-size: 180px;
                z-index: 999;
            }

            .container {
                max-width: 680px;
                margin: 0 auto;
            }

            header {
                margin-bottom: 48px;
            }

            .logo {
                font-family: "Permanent Marker", cursive;
                font-size: 2rem;
                color: var(--ink);
                display: inline-block;
                background: var(--peach);
                padding: 6px 18px;
                border: 2px solid var(--ink);
                box-shadow: var(--shadow);
                margin-bottom: 16px;
                text-decoration: none;
            }

            header p {
                font-size: 0.75rem;
                opacity: 0.5;
                letter-spacing: 0.08em;
                text-transform: uppercase;
            }

            /* loading state */
            #loading {
                display: flex;
                flex-direction: column;
                gap: 12px;
                padding: 40px 0;
            }

            .skeleton {
                height: 14px;
                background: linear-gradient(
                    90deg,
                    #e8ddd4 25%,
                    #f4ece4 50%,
                    #e8ddd4 75%
                );
                background-size: 200% 100%;
                animation: shimmer 1.4s infinite;
                border-radius: 2px;
            }
            .skeleton.short {
                width: 40%;
            }
            .skeleton.medium {
                width: 70%;
            }
            .skeleton.long {
                width: 100%;
            }
            .skeleton.heading {
                height: 20px;
                width: 55%;
                margin-top: 16px;
            }

            @keyframes shimmer {
                0% {
                    background-position: 200% 0;
                }
                100% {
                    background-position: -200% 0;
                }
            }

            /* error state */
            #error {
                display: none;
                border: 2px solid var(--ink);
                box-shadow: var(--shadow);
                padding: 24px;
                background: #fff8f0;
            }

            #error p {
                font-size: 0.85rem;
                line-height: 1.6;
            }
            #error code {
                background: #f0e8de;
                padding: 2px 6px;
                border-radius: 2px;
                font-size: 0.8rem;
            }

            /* policy content */
            #policy-content {
                display: none;
            }

            .policy-card {
                border: 2px solid var(--ink);
                box-shadow: var(--shadow);
                background: #fff;
                padding: 40px;
                animation: fadeUp 0.4s ease forwards;
            }

            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(12px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            /* markdown-style rendering */
            .policy-card h1 {
                font-family: "Permanent Marker", cursive;
                font-size: 1.6rem;
                margin-bottom: 6px;
                line-height: 1.2;
            }

            .policy-card .meta {
                font-size: 0.72rem;
                opacity: 0.45;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                margin-bottom: 32px;
                padding-bottom: 20px;
                border-bottom: 1px dashed #c8bdb4;
            }

            .policy-card h2 {
                font-size: 0.8rem;
                text-transform: uppercase;
                letter-spacing: 0.12em;
                margin: 28px 0 10px;
                color: var(--ink);
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .policy-card h2::before {
                content: "";
                display: inline-block;
                width: 10px;
                height: 10px;
                background: var(--sage);
                border: 1.5px solid var(--ink);
                flex-shrink: 0;
            }

            .policy-card p {
                font-size: 0.82rem;
                line-height: 1.75;
                color: #3a3a3a;
                margin-bottom: 12px;
            }

            .policy-card ul {
                list-style: none;
                margin: 8px 0 16px;
                padding: 0;
            }

            .policy-card ul li {
                font-size: 0.82rem;
                line-height: 1.7;
                color: #3a3a3a;
                padding-left: 20px;
                position: relative;
                margin-bottom: 4px;
            }

            .policy-card ul li::before {
                content: "—";
                position: absolute;
                left: 0;
                color: var(--peach);
                font-weight: bold;
            }

            .policy-card hr {
                border: none;
                border-top: 1px dashed #c8bdb4;
                margin: 28px 0;
            }

            footer {
                margin-top: 32px;
                font-size: 0.7rem;
                opacity: 0.4;
                text-align: center;
                letter-spacing: 0.06em;
            }
        </style>
    </head>
    <body>
        <div class="grain"></div>
        <div class="container">
            <header>
                <a class="logo" href="/">TRIPPING</a>
                <p>Privacy Policy</p>
            </header>

            <!-- Loading -->
            <div id="loading">
                <div class="skeleton heading"></div>
                <div class="skeleton short"></div>
                <div class="skeleton long"></div>
                <div class="skeleton medium"></div>
                <div class="skeleton long"></div>
                <div class="skeleton heading"></div>
                <div class="skeleton long"></div>
                <div class="skeleton medium"></div>
                <div class="skeleton long"></div>
                <div class="skeleton short"></div>
            </div>

            <!-- Error -->
            <div id="error">
                <p>
                    ⚠️ Could not load the privacy policy from
                    <code>/policy</code>.<br />
                    Make sure the file is served at that path on your server.
                </p>
            </div>

            <!-- Content -->
            <div id="policy-content">
                <div class="policy-card" id="policy-card"></div>
            </div>

            <footer>© 2026 An Nguyen · TRIPPING</footer>
        </div>

        <script>
            async function loadPolicy() {
                try {
                    const res = await fetch("/policy-text");
                    if (!res.ok) throw new Error(`${res.status}`);
                    console.log(res);
                    const text = await res.text();
                    renderPolicy(text);
                } catch (err) {
                    document.getElementById("loading").style.display = "none";
                    document.getElementById("error").style.display = "block";
                    console.error("Failed to load policy:", err);
                }
            }

            function renderPolicy(text) {
                const card = document.getElementById("policy-card");
                const lines = text.split("\n");
                let html = "";
                let inList = false;

                for (const raw of lines) {
                    const line = raw.trim();

                    if (!line) {
                        if (inList) {
                            html += "</ul>";
                            inList = false;
                        }
                        continue;
                    }

                    if (line.startsWith("# ")) {
                        html += `<h1>${esc(line.slice(2))}</h1>`;
                    } else if (line.startsWith("## ")) {
                        if (inList) {
                            html += "</ul>";
                            inList = false;
                        }
                        html += `<h2>${esc(line.slice(3))}</h2>`;
                    } else if (line.startsWith("---")) {
                        if (inList) {
                            html += "</ul>";
                            inList = false;
                        }
                        html += "<hr>";
                    } else if (
                        line.startsWith("*Last updated") ||
                        line.startsWith("_Last updated")
                    ) {
                        const inner = line.replace(/^\*|^_|\*$|_$/g, "");
                        html += `<p class="meta">${esc(inner)}</p>`;
                    } else if (line.startsWith("- ") || line.startsWith("* ")) {
                        if (!inList) {
                            html += "<ul>";
                            inList = true;
                        }
                        html += `<li>${esc(line.slice(2))}</li>`;
                    } else {
                        if (inList) {
                            html += "</ul>";
                            inList = false;
                        }
                        html += `<p>${esc(line)}</p>`;
                    }
                }

                if (inList) html += "</ul>";

                card.innerHTML = html;
                document.getElementById("loading").style.display = "none";
                document.getElementById("policy-content").style.display =
                    "block";
            }

            function esc(str) {
                return str
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
                    .replace(/\*(.+?)\*/g, "<em>$1</em>");
            }

            loadPolicy();
        </script>
    </body>
</html>
